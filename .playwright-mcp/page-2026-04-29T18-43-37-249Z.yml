        - generic [ref=e160]:
          - article [ref=e161]:
            - text: "01"
            - heading "Data collection" [level=4] [ref=e162]
            - paragraph [ref=e163]: Collected Booking.com reviews and removed duplicates, resulting in 97,014 usable records.
          - article [ref=e164]:
            - text: "02"
            - heading "Language standardization" [level=4] [ref=e165]
            - paragraph [ref=e166]: Used NLLB-200 to translate and standardize multilingual reviews into one analysis-ready format.
          - article [ref=e167]:
            - text: "03"
            - heading "Attribute mapping" [level=4] [ref=e168]
            - paragraph [ref=e169]: Used Sentence-BERT to map text into 8 service attributes (được báo cáo proxy precision up to 0.92).
          - article [ref=e170]:
            - text: "04"
            - heading "Polarity construction" [level=4] [ref=e171]
            - paragraph [ref=e172]: Separated positive and negative statements to estimate gains and losses independently.
          - article [ref=e173]:
            - text: "05"
            - heading "PRCA + Kano classification" [level=4] [ref=e174]
            - paragraph [ref=e175]: Estimated penalty/reward effects with robust regression, then grouped attributes into 2 Basics, 4 Performance drivers, and 2 Delighters.
