      - generic [ref=e334]:
        - heading "Managerial Hàm ý" [level=3] [ref=e335]
        - generic [ref=e336]:
          - article [ref=e337]:
            - generic [ref=e338]: Pass 1
            - paragraph [ref=e339]: Xem cleanliness và WiFi là điều không thể thỏa hiệp. Cleanliness có penalty dốc nhất (-1.500), còn WiFi gần như không tạo upside khi chỉ ở mức "chấp nhận được" (-0.656 / -0.052).
          - article [ref=e340]:
            - generic [ref=e341]: Pass 2
            - paragraph [ref=e342]: Sau khi basics ổn định, chuẩn hóa staff và room delivery. Staff là upside lever mạnh nhất (+0.680), trong khi room quality vẫn có downside risk cao (-0.967).
          - article [ref=e343]:
            - generic [ref=e344]: Pass 3
            - paragraph [ref=e345]: Dùng food và facilities như differentiator có mục tiêu ở bước cuối. Hai thuộc tính này có penalty risk thấp hơn nhưng reward potential mạnh (Food +0.525, Facilities +0.410).
        - heading "If Extending nghiên cứu" [level=3] [ref=e346]
        - generic [ref=e347]:
          - article [ref=e348]:
            - heading "Ground-truth check for text labels" [level=3] [ref=e349]
            - paragraph [ref=e350]: Manually annotate a review subset for attribute and sentiment labels, then report precision/recall so the NLP mapping can be audited against human coding.
          - article [ref=e351]:
            - heading "Quarterly re-estimation" [level=3] [ref=e352]
            - paragraph [ref=e353]: Re-estimate PRCA by quarter (or rolling windows) to verify whether class assignments stay stable across seasonality and market shifts.
          - article [ref=e354]:
            - heading "Replication in another destination" [level=3] [ref=e355]
            - paragraph [ref=e356]: Run the same pipeline in at least one comparable city using the same preprocessing and mô hình settings to test transferability.
          - article [ref=e357]:
            - heading "Action-to-outcome linkage" [level=3] [ref=e358]
            - paragraph [ref=e359]: Track intervention dates (e.g., housekeeping SOP changes, staff training) and compare before/after shifts in ratings and attribute mentions.
        - paragraph [ref=e360]: "Quy tắc vận hành: bảo vệ basics hằng ngày, review penalty signal hằng tháng, xếp lại ưu tiên hằng quý, và chỉ đầu tư thuộc tính khác biệt hóa sau khi complaint về basics duy trì thấp."
