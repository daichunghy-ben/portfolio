        - paragraph [ref=e144]: Phần mô phỏng kịch bản ở Section 3A liên kết trực tiếp với các hệ số ước tính. Đây không phải dự báo market share, mà là công cụ so sánh minh bạch giúp người đọc không chuyên hiểu hướng tác động và độ lớn tương đối giữa các policy bundle.
