        - generic [ref=e241]:
          - text: Policy Scenario Simulation
          - heading "Coefficient-Based Scenario Simulation" [level=3] [ref=e242]
          - paragraph [ref=e243]: Module này chuyển hệ số ước tính thành so sánh kịch bản. Đây là công cụ truyền thông, không phải forecast nhu cầu. Trong index này, push mang dấu âm, còn pull, support và trust mang dấu dương.
          - generic [ref=e244]:
            - heading "Simulation calculation (ngắn gọn)" [level=4] [ref=e245]
            - generic "Simulation steps" [ref=e246]:
              - article [ref=e247]:
                - paragraph [ref=e248]: 1) Utility index
                - paragraph [ref=e249]: ΔU = (-1.967 × Push) + (2.093 × Pull) + (1.271 × Support) + (0.281 × Trust)
                - paragraph [ref=e250]: Inputs are entered on 0-100 sliders and normalized to [0,1].
              - article [ref=e251]:
                - paragraph [ref=e252]: 2) Mức chấp nhận score
                - paragraph [ref=e253]: Score = clamp(50 + 18 × ΔU, 0, 100)
              - article [ref=e254]:
                - paragraph [ref=e255]: 3) High-mức chấp nhận chance
                - paragraph [ref=e256]: Chance = 100 / (1 + exp(-2.7 × (ΔU - 0.25)))
                - paragraph [ref=e257]: Shown as 1-99 to avoid false certainty.
            - paragraph [ref=e258]:
              - strong [ref=e259]: "Definitions:"
              - text: Push = hạn chế scope and direct burden; Pull = alternative transport quality; Support = financial and implementation support; Trust = confidence in delivery and revenue governance.
