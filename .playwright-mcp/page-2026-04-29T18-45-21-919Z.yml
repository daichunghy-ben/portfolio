          - heading "Mức chấp nhận chính sách phase-out xe máy tại Hà Nội" [level=1] [ref=e37]
          - paragraph [ref=e38]: Dùng discrete choice experiment với cư dân Hà Nội, nghiên cứu này ước tính mức chấp nhận thay đổi thế nào giữa các policy bundle kết hợp phạm vi hạn chế, thay đổi chi phí đi lại, cải thiện giao thông công cộng, hỗ trợ giá vé, tái phân bổ không gian xanh, park-and-ride, hỗ trợ chuyển đổi và quản trị nguồn thu. Phân tích dùng mixed logit, suy ra willingness-to-pay và xác định heterogeneity theo mức phụ thuộc, thu nhập, trust và environmental concern. Kết quả cho thấy lộ trình pull-first và support-first dễ được chấp nhận hơn push-first.
