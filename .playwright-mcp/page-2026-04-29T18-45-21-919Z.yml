        - heading "Phương pháp" [level=2] [ref=e137]
        - paragraph [ref=e138]: Nghiên cứu dùng stated-preference discrete choice experiment (DCE) theo random utility theory. Người trả lời tại Hà Nội hoàn thành nhiều choice task; trong mỗi task, họ chọn giữa các policy bundle và phương án status quo.
        - paragraph [ref=e139]: "Mỗi bundle gồm tám thuộc tính, mỗi thuộc tính có ba mức: phạm vi hạn chế, thay đổi chi phí đi lại, chất lượng phương án thay thế, hỗ trợ giá vé, hỗ trợ chuyển đổi, tái phân bổ không gian xanh, park-and-ride và quản trị nguồn thu. Thiết kế tạo 27 profile trực giao, chia thành 3 block; mỗi người trả lời hoàn thành 9 task."
        - paragraph [ref=e140]:
          - text: We estimated mixed logit mô hìnhs for main effects and interaction effects. Interaction terms tested heterogeneity by motorcycle dependency, income, trust, and environmental concern. Willingness-to-pay values were calculated as coefficient ratios to the cost term, WTP
