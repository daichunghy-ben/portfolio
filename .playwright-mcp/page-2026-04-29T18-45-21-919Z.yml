          - heading "Bối cảnh" [level=2] [ref=e96]
          - paragraph [ref=e97]: Hà Nội đối mặt với một policy dilemma. Chất lượng không khí và ùn tắc tạo lý do để can thiệp, nhưng xe máy vẫn là trung tâm của di chuyển hộ gia đình và tạo thu nhập. Khoảng trống triển khai xuất hiện khi hạn chế đi nhanh hơn phương án thay thế.
        - paragraph [ref=e98]: Nghiên cứu kiểm tra điều kiện khiến cư dân chấp nhận gói phase-out xe máy dùng nhiên liệu hóa thạch. Nó lượng hóa trade-off giữa thuộc tính push, pull và support, rồi ước tính preference heterogeneity theo đặc điểm kinh tế-xã hội và thái độ.
