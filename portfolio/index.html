<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1" name="viewport">
  <title>Chung Hy Dai | Legacy Portfolio Redirect</title>
  <meta content="noindex,follow" name="robots">
  <meta content="Legacy /portfolio/ URL for Chung Hy Dai now redirects to the root portfolio." name="description">
  <link href="/" rel="canonical">
  <meta http-equiv="refresh" content="0; url=/">
  <style>
    :root {
      color-scheme: light;
      --bg: #f8fafc;
      --panel: #ffffff;
      --border: rgba(15, 23, 42, 0.1);
      --text: #0f172a;
      --muted: #475569;
      --accent: #0f766e;
      --accent-2: #2563eb;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: "SF Pro Text", "Segoe UI", Roboto, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }

    main {
      width: min(100%, 34rem);
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: clamp(1.5rem, 4vw, 2.25rem);
      box-shadow: 0 18px 50px rgba(15, 23, 42, 0.1);
      text-align: center;
    }

    .eyebrow {
      margin: 0 0 0.65rem;
      color: var(--accent);
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0 0 0.75rem;
      font-size: clamp(1.8rem, 4vw, 2.7rem);
      line-height: 1.05;
      letter-spacing: -0.04em;
    }

    p {
      margin: 0;
      color: var(--muted);
      font-size: 1rem;
    }

    a {
      color: var(--text);
      font-weight: 700;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 0.75rem;
      margin-top: 1.4rem;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 2.75rem;
      padding: 0.75rem 1rem;
      border-radius: 999px;
      text-decoration: none;
    }

    .primary {
      color: #ffffff;
      background: linear-gradient(135deg, var(--accent-2), var(--accent));
      box-shadow: 0 12px 26px rgba(37, 99, 235, 0.22);
    }

    .secondary {
      background: rgba(255, 255, 255, 0.78);
      border: 1px solid var(--border);
    }

    .note {
      margin-top: 1rem;
      font-size: 0.94rem;
    }
  </style>
  <script>
    (function () {
      const target = new URL('/', window.location.origin);
      target.search = window.location.search;
      target.hash = window.location.hash;
      window.location.replace(target.toString());
    }());
  </script>
</head>
<body>
  <main aria-labelledby="redirect-title">
    <p class="eyebrow">Legacy URL</p>
    <h1 id="redirect-title">Moving this portfolio to the root site.</h1>
    <p>The old <a href="/">/portfolio/</a> URL now points to the root portfolio.</p>
    <div class="actions">
      <a class="button primary" href="/">Go to homepage</a>
      <a class="button secondary" href="/projects.html">Research archive</a>
    </div>
    <p class="note">Use the root domain for the latest canonical URLs.</p>
  </main>
</body>
</html>
